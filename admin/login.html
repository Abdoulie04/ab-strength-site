<!DOCTYPE html>
<html lang="fr">
<head>
<script>
  (function() {
    var t = localStorage.getItem('ab-strength-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion admin — AB STRENGTH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=3">
<link rel="stylesheet" href="admin.css?v=3">
</head>
<body class="admin-body">

<div class="login-wrap">
  <div class="login-card">
    <p class="logo login-logo">AB <span class="logo-accent">STRENGTH</span></p>
    <p class="login-sub">Espace admin — connexion requise</p>

    <form class="login-form" id="loginForm">
      <div class="form-field">
        <label for="nom_utilisateur">Nom d'utilisateur</label>
        <input type="text" id="nom_utilisateur" name="nom_utilisateur" required autocomplete="username">
      </div>
      <div class="form-field">
        <label for="mot_de_passe">Mot de passe</label>
        <input type="password" id="mot_de_passe" name="mot_de_passe" required autocomplete="current-password">
      </div>
      <p class="login-error" id="loginError"></p>
      <button type="submit" class="btn btn-primary login-submit" id="loginSubmit">Se connecter</button>
    </form>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="../config.js?v=3"></script>
<script src="../theme-toggle.js?v=3"></script>
<script src="admin-common.js?v=3"></script>
<script src="login.js?v=3"></script>
</body>
</html>
