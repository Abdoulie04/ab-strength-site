<!DOCTYPE html>
<html lang="fr">
<head>
<script>
  (function() {
    var t = localStorage.getItem('ab-strength-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gérer le programme — AB STRENGTH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=3">
<link rel="stylesheet" href="admin.css?v=3">
</head>
<body class="admin-body">

<header class="admin-header">
  <div class="admin-header-left">
    <span class="logo">AB <span class="logo-accent">STRENGTH</span></span>
    <span class="admin-badge">Espace admin</span>
  </div>
  <div class="admin-header-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Changer de thème">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.2" y1="4.2" x2="5.6" y2="5.6"></line>
        <line x1="18.4" y1="18.4" x2="19.8" y2="19.8"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.2" y1="19.8" x2="5.6" y2="18.4"></line>
        <line x1="18.4" y1="5.6" x2="19.8" y2="4.2"></line>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
      </svg>
    </button>
    <span class="admin-name" id="adminName">Admin</span>
    <button class="btn-logout" id="logoutBtn">Déconnexion</button>
  </div>
</header>

<main class="admin-main">

  <a href="dashboard.html" class="admin-back-link">← Retour au tableau de bord</a>

  <div class="admin-section-head">
    <h2 id="programmeTitreHead">Chargement...</h2>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab-btn active" data-tab="entrainement">Entraînement</button>
    <button class="admin-tab-btn" data-tab="alimentation">Alimentation</button>
  </div>

  <!-- ===== ENTRAÎNEMENT ===== -->
  <section class="admin-panel active" id="panel-entrainement">

    <form class="admin-form form-single-col" id="etapeForm">
      <div class="form-field">
        <label for="ef_titre">Titre de l'étape (ex: Jour 1 : Push)</label>
        <input type="text" id="ef_titre" required>
      </div>
      <div class="form-field">
        <label for="ef_description">Description (optionnel)</label>
        <input type="text" id="ef_description">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-sm">+ Ajouter une étape</button>
      </div>
    </form>

    <div id="etapesContainer"></div>
  </section>

  <!-- ===== ALIMENTATION ===== -->
  <section class="admin-panel" id="panel-alimentation">

    <div class="admin-section-head"><h2>Macros et notes</h2></div>
    <form class="admin-form" id="nutritionForm">
      <div class="form-field">
        <label for="nf_calories">Calories / jour</label>
        <input type="number" id="nf_calories" min="0">
      </div>
      <div class="form-field">
        <label for="nf_proteines">Protéines (g)</label>
        <input type="number" id="nf_proteines" min="0">
      </div>
      <div class="form-field">
        <label for="nf_glucides">Glucides (g)</label>
        <input type="number" id="nf_glucides" min="0">
      </div>
      <div class="form-field">
        <label for="nf_lipides">Lipides (g)</label>
        <input type="number" id="nf_lipides" min="0">
      </div>
      <div class="form-field full-width">
        <label for="nf_notes">Notes / conseils</label>
        <textarea id="nf_notes" rows="3"></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-sm">Enregistrer la fiche nutrition</button>
      </div>
    </form>

    <div class="admin-section-head"><h2>Repas types</h2></div>
    <form class="admin-form" id="repasForm">
      <div class="form-field">
        <label for="rf_titre">Titre (ex: Petit-déjeuner)</label>
        <input type="text" id="rf_titre" required>
      </div>
      <div class="form-field">
        <label for="rf_calories">Calories</label>
        <input type="number" id="rf_calories" min="0">
      </div>
      <div class="form-field full-width">
        <label for="rf_description">Composition du repas</label>
        <textarea id="rf_description" rows="2" required></textarea>
      </div>
      <div class="form-field">
        <label for="rf_proteines">Protéines (g)</label>
        <input type="number" id="rf_proteines" min="0">
      </div>
      <div class="form-field">
        <label for="rf_glucides">Glucides (g)</label>
        <input type="number" id="rf_glucides" min="0">
      </div>
      <div class="form-field">
        <label for="rf_lipides">Lipides (g)</label>
        <input type="number" id="rf_lipides" min="0">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-sm">+ Ajouter le repas</button>
      </div>
    </form>

    <div class="admin-repas-grid" id="repasContainer"></div>
  </section>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="../config.js?v=3"></script>
<script src="../theme-toggle.js?v=3"></script>
<script src="admin-common.js?v=3"></script>
<script src="programme-edit.js?v=3"></script>
</body>
</html>
