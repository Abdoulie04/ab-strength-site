<!DOCTYPE html>
<html lang="fr">
<head>
<script>
  (function() {
    var t = localStorage.getItem('ab-strength-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détail du programme — AB STRENGTH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<!-- ===== NAVIGATION ===== -->
<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <a href="index.html" class="logo">AB <span class="logo-accent">STRENGTH</span></a>
    <nav class="main-nav" id="mainNav">
      <a href="index.html#programmes">Programmes</a>
      <a href="index.html#comment-ca-marche">Comment ça marche</a>
      <a href="index.html#coaching">Coaching perso</a>
      <a href="index.html#contact">Contact</a>
      <a href="admin/login.html" class="nav-admin">Espace admin</a>
    </nav>
    <div class="header-actions">
    <button class="theme-toggle" id="themeToggle" aria-label="Changer de thème">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.2" y1="4.2" x2="5.6" y2="5.6"></line>
        <line x1="18.4" y1="18.4" x2="19.8" y2="19.8"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.2" y1="19.8" x2="5.6" y2="18.4"></line>
        <line x1="18.4" y1="5.6" x2="19.8" y2="4.2"></line>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
      </svg>
    </button>
    <button class="burger" id="burgerBtn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    </div>
  </div>
</header>

<div class="state-message" id="loadingState">
  <div class="spinner"></div>
  <p>Chargement du programme...</p>
</div>

<div class="state-message" id="errorState" style="display:none;">
  <p>Ce programme est introuvable ou a été supprimé.</p>
  <a href="index.html#programmes" class="btn btn-ghost">Retour aux programmes</a>
</div>

<div id="programmeContent" style="display:none;">

  <!-- ===== EN-TÊTE PROGRAMME ===== -->
  <section class="prog-hero">
    <div class="prog-hero-inner">
      <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Retour
      </button>
      <p class="section-eyebrow" id="progCategorie">Catégorie</p>
      <h1 class="prog-hero-title" id="progTitre">Titre du programme</h1>
      <p class="prog-hero-desc" id="progDescription"></p>
      <div class="prog-meta" id="progMeta"></div>
    </div>
  </section>

  <!-- ===== ONGLET NAV : ENTRAÎNEMENT / ALIMENTATION ===== -->
  <div class="tabs-nav">
    <div class="tabs-nav-inner">
      <button class="tab-btn active" data-tab="entrainement">Entraînement</button>
      <button class="tab-btn" data-tab="alimentation">Alimentation</button>
    </div>
  </div>

  <!-- ===== ENTRAÎNEMENT ===== -->
  <section class="tab-panel active" id="panel-entrainement">
    <div class="panel-inner" id="etapesContainer"></div>
  </section>

  <!-- ===== ALIMENTATION ===== -->
  <section class="tab-panel" id="panel-alimentation">
    <div class="panel-inner">

      <div class="macros-grid" id="macrosGrid"></div>
      <p class="nutrition-notes" id="nutritionNotes"></p>

      <h3 class="repas-title">Repas types</h3>
      <div class="repas-list" id="repasContainer"></div>

    </div>
  </section>

</div>

<!-- ===== FOOTER ===== -->
<footer class="site-footer">
  <div class="footer-inner">
    <span class="logo">AB <span class="logo-accent">STRENGTH</span></span>
    <p>© 2026 — Programmes de musculation par Abdoulie</p>
    <a href="admin/login.html" class="footer-admin">Espace admin</a>
  </div>
</footer>

<!-- ===== BOUTON RETOUR EN HAUT ===== -->
<button class="back-to-top" id="backToTop" aria-label="Remonter en haut de la page">
  <svg class="btt-ring" viewBox="0 0 60 60">
    <circle class="btt-ring-bg" cx="30" cy="30" r="26"/>
    <circle class="btt-ring-progress" id="bttProgress" cx="30" cy="30" r="26"/>
  </svg>
  <svg class="btt-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="19" x2="12" y2="5"></line>
    <polyline points="5 12 12 5 19 12"></polyline>
  </svg>
</button>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="config.js?v=2"></script>
<script src="theme-toggle.js?v=2"></script>
<script src="common.js?v=2"></script>
<script src="programme.js?v=2"></script>
</body>
</html>
